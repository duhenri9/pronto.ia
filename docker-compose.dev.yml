services:
  postgres:
    image: postgres:16-alpine
    container_name: pronto-ia-db
    environment:
      POSTGRES_USER: pronto
      POSTGRES_PASSWORD: pronto
      POSTGRES_DB: pronto_ia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pronto -d pronto_ia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pronto-ia-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
